services:
  mighty:
    build:
      context: .
      dockerfile: Dockerfile.debug
    ports:
      - "2345:2345"
    security_opt:
      - "seccomp:unconfined"
    cap_add:
      - SYS_PTRACE
    environment:
      # Ensure any environment variables needed for dev are here
      # (Inherits from base docker-compose.yml usually, but good to check)
      GO_ENV: development
