services:
  mighty:
    build: .
    ports:
      - "8080:8080"
    environment:
      REDIS_ADDR: "redis:6379"
      REDIS_PASSWORD: ""
      REDIS_DB: ""
      POSTGRES_CONN: "postgres://postgres:mightypassword@postgres:5432/postgres?sslmode=disable"
      JWT_SECRET: "supersecretkey"
    secrets:
      - postgres_password
    depends_on:
      - redis
      - postgres   # Mighty will start after Redis and Postgres containers start
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  postgres:
    image: "postgres:16"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_DB: postgres
      POSTGRES_PASSWORD_FILE: /run/secrets/postgres_password
    secrets:
      - postgres_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations/000001_initial_schema.up.sql:/docker-entrypoint-initdb.d/init.sql

secrets:
  postgres_password:
    file: ./secrets/postgres_password.txt

volumes:
  redis_data:
  postgres_data: